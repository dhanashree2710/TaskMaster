<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password managed by admin - TaskMaster</title>
<link rel="icon" href="assets/img/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-shell auth-shell-simple">
  <div class="auth-form-panel">
    <button class="theme-toggle theme-toggle-fixed" data-theme-toggle aria-label="Toggle theme"></button>
    <div class="auth-form-inner center-card">
      <div class="brand-mobile always-show">
        <img src="assets/img/logo.png" alt="TaskMaster" />
        <span>TaskMaster</span>
      </div>

      <span class="auth-eyebrow">Managed accounts</span>
      <h1>Password changes are admin managed</h1>
      <p class="subtitle">This app no longer uses Supabase Auth reset links. Ask a Super Admin, Admin, or Manager to update your users-table account.</p>

      <button id="back-to-login" class="btn-gradient w-100">
        <span>Back to sign in</span>
      </button>
    </div>
  </div>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/reset-password.js"></script>
</body>
</html>
